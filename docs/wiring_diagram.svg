<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d62828" />
    </marker>
    <marker id="arrow-black" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222222" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1d4ed8" />
    </marker>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 10; }
      .box-power { fill: #fff7ed; stroke: #9a3412; stroke-width: 2; rx: 10; }
      .box-ctrl { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 10; }
      .box-sensor { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 10; }
      .box-warn { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 10; }
      .label { font: 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .small { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #374151; }
      .tiny { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #4b5563; }
      .pin { font: 14px Consolas, "Microsoft YaHei", monospace; fill: #111827; }
      .red { stroke: #d62828; stroke-width: 5; fill: none; marker-end: url(#arrow-red); }
      .black { stroke: #222222; stroke-width: 5; fill: none; marker-end: url(#arrow-black); }
      .blue { stroke: #1d4ed8; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .green { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .orange { stroke: #f97316; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .dash { stroke-dasharray: 8 6; }
      .wire-label-bg { fill: #ffffff; opacity: 0.92; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#f8fafc" />
  <text x="50" y="55" class="title">智能桨板详细接线图（不使用 LoRa）</text>
  <text x="50" y="88" class="subtitle">7S8P 电池、双 100A 电调、ESP32、GPS、IMU、双路电流检测、有线备用控制器</text>

  <rect x="50" y="120" width="210" height="120" class="box-power" />
  <text x="75" y="155" class="label">7S8P 三元锂电池</text>
  <text x="75" y="184" class="small">标称 25.9V</text>
  <text x="75" y="210" class="small">满电约 29.4V</text>

  <rect x="310" y="120" width="170" height="120" class="box-power" />
  <text x="340" y="155" class="label">60A BMS</text>
  <text x="335" y="184" class="small">保护板</text>
  <text x="335" y="210" class="small">总放电限流</text>

  <rect x="535" y="120" width="150" height="120" class="box-warn" />
  <text x="568" y="155" class="label">保险</text>
  <text x="558" y="184" class="small">主电源支路</text>
  <text x="558" y="210" class="small">建议必装</text>

  <rect x="735" y="120" width="160" height="120" class="box-warn" />
  <text x="765" y="155" class="label">主开关</text>
  <text x="755" y="184" class="small">可加急停</text>
  <text x="755" y="210" class="small">防水安装</text>

  <line x1="260" y1="160" x2="310" y2="160" class="red" />
  <line x1="480" y1="160" x2="535" y2="160" class="red" />
  <line x1="685" y1="160" x2="735" y2="160" class="red" />
  <line x1="895" y1="160" x2="1030" y2="160" class="red" />
  <rect x="1040" y="135" width="180" height="50" class="box-power" />
  <text x="1085" y="166" class="label">主正母线</text>

  <line x1="260" y1="210" x2="1220" y2="210" class="black" />
  <rect x="1040" y="215" width="180" height="50" class="box-power" />
  <text x="1085" y="246" class="label">主负母线</text>

  <rect x="80" y="325" width="210" height="100" class="box-power" />
  <text x="115" y="360" class="label">电量显示模块</text>
  <text x="115" y="388" class="small">接主开关之后</text>
  <text x="115" y="412" class="small">确认支持 7S/29.4V</text>
  <line x1="900" y1="160" x2="290" y2="345" class="red dash" />
  <line x1="1040" y1="240" x2="290" y2="400" class="black dash" />

  <rect x="355" y="325" width="230" height="115" class="box-power" />
  <text x="392" y="360" class="label">DC-DC 6-32V 转 5V</text>
  <text x="388" y="390" class="small">IN+ 接主开关后正极</text>
  <text x="388" y="416" class="small">OUT+ 输出 5V</text>
  <line x1="900" y1="160" x2="585" y2="360" class="red" />
  <line x1="1040" y1="240" x2="585" y2="415" class="black" />

  <rect x="700" y="315" width="250" height="170" class="box-ctrl" />
  <text x="770" y="350" class="label">ESP32 控制器</text>
  <text x="725" y="380" class="pin">5V/VIN  ← DC-DC OUT+</text>
  <text x="725" y="405" class="pin">GND     ← DC-DC OUT- / 系统地</text>
  <text x="725" y="430" class="pin">GPIO26  → 左 ESC PWM</text>
  <text x="725" y="455" class="pin">GPIO25  → 右 ESC PWM</text>
  <text x="725" y="480" class="pin">GPIO2   → 状态 LED</text>

  <line x1="585" y1="380" x2="700" y2="380" class="red" />
  <line x1="585" y1="415" x2="700" y2="405" class="black" />

  <rect x="1030" y="325" width="200" height="95" class="box-sensor" />
  <text x="1090" y="360" class="label">IMU</text>
  <text x="1065" y="388" class="small">ICM20948V2</text>
  <text x="1055" y="412" class="pin">SDA GPIO14 / SCL GPIO22</text>
  <line x1="950" y1="392" x2="1030" y2="382" class="green" />
  <rect x="965" y="372" width="55" height="22" class="wire-label-bg" />
  <text x="970" y="389" class="tiny">I2C</text>

  <rect x="1030" y="455" width="200" height="95" class="box-sensor" />
  <text x="1090" y="490" class="label">GPS</text>
  <text x="1058" y="518" class="small">GPS TX → GPIO16</text>
  <text x="1058" y="542" class="small">GPS PPS → GPIO13</text>
  <text x="1058" y="566" class="small">GPS RX 不接</text>
  <line x1="950" y1="505" x2="1030" y2="505" class="green" />
  <rect x="965" y="485" width="60" height="22" class="wire-label-bg" />
  <text x="970" y="502" class="tiny">UART</text>

  <rect x="80" y="580" width="240" height="120" class="box-sensor" />
  <text x="120" y="615" class="label">左 ACS758-050</text>
  <text x="110" y="645" class="small">IP+ → IP- 串入左 ESC 正极</text>
  <text x="110" y="672" class="pin">OUT → GPIO36</text>
  <text x="110" y="696" class="pin">VCC 3V3 / GND</text>

  <rect x="80" y="780" width="240" height="120" class="box-sensor" />
  <text x="120" y="815" class="label">右 ACS758-050</text>
  <text x="110" y="845" class="small">IP+ → IP- 串入右 ESC 正极</text>
  <text x="110" y="872" class="pin">OUT → GPIO39</text>
  <text x="110" y="896" class="pin">VCC 3V3 / GND</text>

  <rect x="410" y="560" width="220" height="155" class="box-power" />
  <text x="465" y="595" class="label">左 100A 电调</text>
  <text x="445" y="625" class="pin">S  ← GPIO26</text>
  <text x="445" y="650" class="pin">G  ← ESP32 GND</text>
  <text x="445" y="675" class="pin">粗红线 ← 左 ACS IP-</text>
  <text x="445" y="700" class="pin">粗黑线 ← 主负母线</text>

  <rect x="410" y="760" width="220" height="155" class="box-power" />
  <text x="465" y="795" class="label">右 100A 电调</text>
  <text x="445" y="825" class="pin">S  ← GPIO25</text>
  <text x="445" y="850" class="pin">G  ← ESP32 GND</text>
  <text x="445" y="875" class="pin">粗红线 ← 右 ACS IP-</text>
  <text x="445" y="900" class="pin">粗黑线 ← 主负母线</text>

  <rect x="725" y="590" width="175" height="95" class="box-power" />
  <text x="760" y="625" class="label">左 6010 电机</text>
  <text x="754" y="655" class="small">三相线接左 ESC</text>
  <rect x="725" y="790" width="175" height="95" class="box-power" />
  <text x="760" y="825" class="label">右 6010 电机</text>
  <text x="754" y="855" class="small">三相线接右 ESC</text>

  <line x1="1040" y1="160" x2="320" y2="610" class="red" />
  <line x1="320" y1="610" x2="410" y2="675" class="red" />
  <line x1="1040" y1="160" x2="320" y2="810" class="red" />
  <line x1="320" y1="810" x2="410" y2="875" class="red" />
  <line x1="1040" y1="240" x2="410" y2="700" class="black" />
  <line x1="1040" y1="240" x2="410" y2="900" class="black" />

  <line x1="950" y1="430" x2="410" y2="625" class="blue" />
  <line x1="950" y1="455" x2="410" y2="825" class="blue" />
  <line x1="950" y1="405" x2="410" y2="650" class="black dash" />
  <line x1="950" y1="405" x2="410" y2="850" class="black dash" />

  <line x1="630" y1="635" x2="725" y2="635" class="blue" />
  <line x1="630" y1="835" x2="725" y2="835" class="blue" />
  <text x="652" y="626" class="tiny">三相</text>
  <text x="652" y="826" class="tiny">三相</text>

  <line x1="320" y1="672" x2="700" y2="450" class="orange" />
  <rect x="490" y="535" width="80" height="22" class="wire-label-bg" />
  <text x="498" y="552" class="tiny">左电流 ADC</text>
  <line x1="320" y1="872" x2="700" y2="455" class="orange" />
  <rect x="520" y="710" width="80" height="22" class="wire-label-bg" />
  <text x="528" y="727" class="tiny">右电流 ADC</text>

  <rect x="1015" y="625" width="320" height="245" class="box-sensor" />
  <text x="1110" y="660" class="label">应急有线控制器</text>
  <text x="1045" y="692" class="pin">左摇杆中点 → GPIO35</text>
  <text x="1045" y="718" class="pin">右摇杆中点 → GPIO32</text>
  <text x="1045" y="744" class="pin">加档 → GPIO17</text>
  <text x="1045" y="770" class="pin">减档 → GPIO18</text>
  <text x="1045" y="796" class="pin">回到空档 → GPIO19</text>
  <text x="1045" y="822" class="pin">方向锁定 → GPIO23</text>
  <line x1="950" y1="455" x2="1015" y2="690" class="orange" />
  <line x1="950" y1="455" x2="1015" y2="718" class="orange" />
  <line x1="950" y1="430" x2="1015" y2="745" class="blue" />
  <line x1="950" y1="430" x2="1015" y2="795" class="blue" />

  <rect x="1015" y="900" width="320" height="90" class="box-sensor" />
  <text x="1060" y="935" class="label">电池电压采样分压</text>
  <text x="1045" y="965" class="pin">电池总正极 → 分压 → GPIO34</text>
  <text x="1045" y="988" class="small">ESP32 ADC 不可直接接 29.4V</text>
  <line x1="1040" y1="160" x2="1015" y2="940" class="orange dash" />
  <line x1="1040" y1="240" x2="1015" y2="970" class="black dash" />

  <rect x="60" y="980" width="1480" height="80" class="box" />
  <text x="85" y="1012" class="label">重要安全备注</text>
  <text x="85" y="1042" class="small">1. 所有低压信号地必须与 ESC 信号 G、电池负极共地。2. ESP32 只接 DC-DC 5V/VIN，不接 7S 电池。3. 电机测试必须不装桨，先限流低功率。4. 有线控制器不能替代硬件急停。</text>

  <rect x="1260" y="120" width="280" height="145" class="box" />
  <text x="1285" y="153" class="label">线色图例</text>
  <line x1="1288" y1="180" x2="1360" y2="180" class="red" />
  <text x="1375" y="186" class="small">主电源正极</text>
  <line x1="1288" y1="210" x2="1360" y2="210" class="black" />
  <text x="1375" y="216" class="small">地 / 负极</text>
  <line x1="1288" y1="240" x2="1360" y2="240" class="blue" />
  <text x="1375" y="246" class="small">数字/PWM 信号</text>
</svg>
